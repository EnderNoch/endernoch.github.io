<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Przekierowanie...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .timer-ring {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 2rem;
    }

    .timer-ring svg {
      transform: rotate(-90deg);
    }

    .timer-ring circle {
      fill: none;
      stroke-width: 6;
    }

    .track {
      stroke: #2a2a2a;
    }

    .progress {
      stroke: #7c3aed;
      stroke-linecap: round;
      stroke-dasharray: 314;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear;
    }

    .timer-number {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 2.5rem;
      font-weight: 700;
      color: #7c3aed;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #c0c0c0;
    }

    .url-display {
      font-size: 0.9rem;
      color: #666;
      word-break: break-all;
      max-width: 400px;
      margin: 0 auto 1.5rem;
    }

    .btn {
      display: inline-block;
      padding: 0.6rem 1.4rem;
      border: 1px solid #444;
      border-radius: 6px;
      background: transparent;
      color: #aaa;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: #7c3aed;
      color: #7c3aed;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="timer-ring">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="track" cx="60" cy="60" r="50" />
        <circle class="progress" id="progress" cx="60" cy="60" r="50" />
      </svg>
      <span class="timer-number" id="countdown">3</span>
    </div>

    <h1>Przekierowanie za <span id="sec">3</span> s...</h1>
    <p class="url-display" id="target-url"></p>
    <a class="btn" id="go-now" href="#">Przejdź teraz</a>
  </div>

  <script>
    const TOTAL = 3;
    const CIRCUMFERENCE = 2 * Math.PI * 50; // ~314

    async function init() {
      let target = '#';
      try {
        const res = await fetch('redirect.json?_=' + Date.now());
        const data = await res.json();
        target = data.url || '#';
      } catch (e) {
        console.error('Nie udało się wczytać redirect.json', e);
      }

      document.getElementById('target-url').textContent = target;
      document.getElementById('go-now').href = target;

      const progressEl = document.getElementById('progress');
      const countdownEl = document.getElementById('countdown');
      const secEl = document.getElementById('sec');

      progressEl.style.strokeDasharray = CIRCUMFERENCE;
      progressEl.style.strokeDashoffset = 0;

      let remaining = TOTAL;

      function tick() {
        remaining -= 1;
        countdownEl.textContent = remaining;
        secEl.textContent = remaining;

        const offset = CIRCUMFERENCE * (1 - remaining / TOTAL);
        progressEl.style.strokeDashoffset = offset;

        if (remaining <= 0) {
          window.location.href = target;
        } else {
          setTimeout(tick, 1000);
        }
      }

      setTimeout(tick, 1000);
    }

    init();
  </script>
</body>
</html>
